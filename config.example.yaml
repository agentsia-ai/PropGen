# ============================================================
# PropGen — Configuration Template
# Copy to config.yaml and customize for your deployment.
#
# config.yaml is gitignored. Never commit a configured copy
# of this file to a public repository.
#
# This example is a fictional design studio; replace the
# fields with your own. The nested keys map 1:1 onto the
# Pydantic models in src/propgen/config/loader.py.
# ============================================================

# --- Identity ---
# operator_* — human who approves proposals, PDF author, DocuSign reply-to.
# agent_* — persona on cover-note email signature and MCP/log labels.
operator_name: "Pat Operator"
operator_title: "Principal Consultant"
operator_email: "ops@northstar-design.example"
agent_name: "Proposal Assistant"
agent_email: "proposals@northstar-design.example"

# --- Business ---
business:
  name: "Northstar Design"
  business_type: "design studio"

  # IANA timezone. Stored datetimes are UTC; presented in this zone.
  timezone: "America/New_York"

  # Customer-facing tone descriptor. Concrete > abstract.
  communication_tone: "warm, direct, never over-promises"

  # Mailing / footer address — appears on the PDF cover and footer.
  address: "1234 Example St, Brooklyn NY 11201"

  # Branding — drives the PDF renderer.
  brand:
    # Path to the logo image (PNG / JPG). Relative paths resolve against
    # the working directory at runtime.
    logo_path: "./assets/logo.png"
    # Hex color used for headings, table headers, and the accent bar.
    primary_color: "#2A4A3B"
    # Hex color used for subheadings and the footer rule.
    secondary_color: "#C7B89C"
    # Legal name printed in the PDF footer (and on the signature block).
    legal_name: "Northstar Design LLC"
    # Footer text printed under the legal name on every PDF page.
    footer_text: "Northstar Design LLC  •  northstar-design.example"

# --- Pricing ---
pricing:
  # ISO 4217 currency code. Used for PDF formatting + AI prompt context.
  currency: "USD"

  # Default tax rate as a decimal (0.0875 = 8.75%). 0.0 = no tax.
  default_tax_rate: 0.0

  # The catalog of priced offerings the business sells. Each line item
  # generated by the drafter or pricer must match one of these slugs
  # OR be marked as a custom (non-catalog) line item by the operator.
  catalog:
    - slug: "discovery_call"
      name: "Discovery Call"
      description: "30-minute scoping conversation."
      unit: "session"
      unit_price: 0
      billing_kind: "fixed"
      taxable: false

    - slug: "consulting_hour"
      name: "Senior Consulting"
      description: "Per-hour senior design / strategy consulting."
      unit: "hour"
      unit_price: 250
      billing_kind: "hourly"
      taxable: true

    - slug: "brand_identity"
      name: "Brand Identity Package"
      description: "Logo, type system, color palette, brand guide."
      unit: "package"
      unit_price: 8500
      billing_kind: "fixed"
      taxable: true

    - slug: "web_design_page"
      name: "Web Design — per page"
      description: "Custom-designed page (excluding development)."
      unit: "page"
      unit_price: 1200
      billing_kind: "per_unit"
      taxable: true

# --- Proposal lifecycle ---
proposal:
  # How long a sent proposal stays valid before auto-mark-expired.
  valid_for_days: 14

  # SAFETY: never auto-send a proposal. The send_proposal MCP tool only
  # produces a draft envelope unless an operator has approved it.
  require_approval: true

  # Cover-note email subject template. Jinja-ish placeholders — only
  # `{{ subject }}`, `{{ business_name }}`, and `{{ client_name }}` are
  # substituted at runtime.
  cover_email_subject_template: "Proposal: {{ subject }}"

  # Follow-up cadence in days after the proposal is sent. The engine
  # drafts the next follow-up at the configured offset; the operator
  # always approves before sending.
  follow_up_cadence_days: [3, 7, 14]

  # Belt-and-braces — leaving this false guarantees a future
  # misconfiguration can't silently auto-send a follow-up.
  auto_followup: false

  # Standard terms appended to every PDF, in markdown. Edit liberally.
  accept_terms_md: |
    ## Terms & Conditions

    1. **Acceptance.** Signing this proposal authorizes us to begin work
       under the scope, timeline, and pricing above.
    2. **Payment.** Invoices are net 14. Late payments accrue 1.5% per
       month.
    3. **Scope.** Anything outside the listed deliverables is a change
       request and is quoted separately.
    4. **Cancellation.** Either party may cancel with 14 days' written
       notice. Work performed up to the cancellation date is invoiced
       at the rates above.

# --- Cross-engine reads (sibling LeadGen / SchedBot SQLite, READ-ONLY) ---
# PropGen reads these databases by file path only — it does NOT import
# the leadgen / schedbot Python packages. Set to null to disable.
# See docs/CROSS_ENGINE.md for the documented column contract.
cross_engine:
  leadgen_db: null    # e.g. "../LeadGen/data/leadgen.db"
  schedbot_db: null   # e.g. "../SchedBot/data/schedbot.db"

# --- AI ---
ai:
  model: "claude-sonnet-4-20250514"

  # Point at external prompt files to override engine defaults without
  # subclassing. Paths resolve against the working directory at runtime.
  # classifier_prompt_path: "./prompts/classifier.txt"
  # drafter_prompt_path: "./prompts/drafter.txt"
  # pricer_prompt_path:   "./prompts/pricer.txt"

  # Classifier confidence floor. Anything below this is collapsed to
  # `RequestKind.UNCERTAIN`, which never auto-acts.
  min_classification_confidence: 0.55

  # Pricing-assistant confidence floor. Below this, the assistant's
  # suggested line items are surfaced as "needs operator review" rather
  # than landing in a draft.
  min_pricing_confidence: 0.6

  # Hard cap on generated narrative length per section. Overflow is
  # truncated.
  max_narrative_chars: 6000

# --- DocuSign (recommended primary e-sign integration) ---
docusign:
  enabled: true
  # Demo: https://demo.docusign.net/restapi
  # Production: https://www.docusign.net/restapi
  base_url: "https://demo.docusign.net/restapi"

  # OAuth host. `account-d.docusign.com` is demo; `account.docusign.com`
  # is production. (Also configurable via DOCUSIGN_OAUTH_HOST in .env.)
  oauth_host: "account-d.docusign.com"

  # Optional DocuSign template id. When set, the connector uses it to
  # carry over signature anchors / branding; when blank, PropGen pushes
  # the rendered PDF directly with a SignHere tab anchored on the literal
  # string `<<SIGN_HERE>>` that the renderer drops into the signature
  # block.
  template_id: ""

  # Anchor string the renderer inserts into the signature block AND the
  # connector tells DocuSign to anchor a SignHere tab to. Change with
  # care; both sides must agree.
  sign_here_anchor: "<<SIGN_HERE>>"

  # Email subject + body the DocuSign envelope uses. Keep it short — the
  # cover-note email PropGen sends separately is the marketing surface.
  envelope_email_subject: "Please sign: {{ subject }}"
  envelope_email_body: |
    Please review and sign the attached proposal. If anything looks off,
    just reply to this email and we'll fix it.

# --- Dropbox Sign (alternative e-sign provider — stub in v0.1.0) ---
dropbox_sign:
  enabled: false

# --- PandaDoc (alternative full-stack proposal/e-sign tool — stub in v0.1.0) ---
pandadoc:
  enabled: false

# --- Inbound webhook receiver (proposal-request from website forms) ---
webhook:
  enabled: false
  hmac_header: "X-PropGen-Signature"
  expected_path: "/webhooks/proposal-request"

# --- Email parser (turn inbound emails into proposal requests) ---
email_parser:
  enabled: false
  # Heuristics to help the AI extract intent from prose.
  keywords_quote: ["quote", "estimate", "proposal", "pricing", "cost"]
  keywords_revise: ["revise", "update", "change", "tweak"]

# --- Outreach (cover note + follow-up sending) ---
outreach:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_starttls: true
  smtp_username: ""           # filled from .env at runtime
  from_address: "ops@northstar-design.example"

  # Cover-note signature uses agent_name + business_name (not operator_*).
  email_signature: |
    Best,
    {agent_name}
    {business_name}

# --- Follow-up scheduler ---
scheduler:
  # IANA timezone the follow-up cadence is computed in. Defaults to the
  # business timezone above; override here only when the follow-up
  # business hours differ.
  timezone: "America/New_York"

  # When true, follow-ups are scheduled inside business hours only
  # (08:00–17:00 in `scheduler.timezone`); outside-hours offsets are
  # snapped to the next business-hours window.
  business_hours_only: true

# --- Database ---
database:
  backend: "sqlite"
  sqlite_path: "./data/propgen.db"

  # Where rendered proposal PDFs live. Each ProposalVersion's pdf_path
  # is stored as a path relative to this root.
  pdf_dir: "./data/proposals"
